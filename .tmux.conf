# --- General Settings ---
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g status-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0
set -g repeat-time 0
set -g mouse on
set -g focus-events on
set -g history-limit 10000

# --- Key Bindings ---
# Prefix: C-j or C-f
set -g prefix C-j
set -g prefix2 C-f
bind C-j send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes (current path)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Navigation (No prefix)
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Switch windows (Shift + Arrow)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Reorder windows (Ctrl + Shift + Arrow)
bind -n C-S-Left swap-window -t -1\; select-window -t -1
bind -n C-S-Right swap-window -t +1\; select-window -t +1

# Copy Mode (Vi)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind p paste-buffer

# Synchronize panes
bind y setw synchronize-panes

# Kill without confirmation
bind x kill-pane
bind & kill-window

# Window switching (Alt+x for next tab, Alt+z for previous tab)
bind -n M-x next-window
bind -n M-z previous-window

# --- Theme & Status Bar ---
# Rosé Pine palette
set -g @rose_pine_base "#191724"
set -g @rose_pine_surface "#1f1d2e"
set -g @rose_pine_overlay "#26233a"
set -g @rose_pine_muted "#6e6a86"
set -g @rose_pine_subtle "#908caa"
set -g @rose_pine_text "#e0def4"
set -g @rose_pine_love "#eb6f92"
set -g @rose_pine_gold "#f6c177"
set -g @rose_pine_rose "#ebbcba"
set -g @rose_pine_pine "#31748f"
set -g @rose_pine_foam "#9ccfd8"
set -g @rose_pine_iris "#c4a7e7"
set -g @rose_pine_highlight_low "#21202e"
set -g @rose_pine_highlight_med "#403d52"

set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g pane-border-status off

set -g status-style "bg=default,fg=#{@rose_pine_subtle}"
set -g status-left-length 32
set -g status-right-length 48
set -g status-left "#[bg=#{@rose_pine_overlay},fg=#{@rose_pine_foam},bold] #S #[bg=default,fg=#{@rose_pine_overlay}]"
set -g status-right "#[fg=#{@rose_pine_muted}]#{?client_prefix,#[fg=#{@rose_pine_love}]PREFIX ,}#[fg=#{@rose_pine_subtle}]#H #[fg=#{@rose_pine_iris}]%Y-%m-%d #[fg=#{@rose_pine_foam}]%H:%M "

# Window Status
setw -g window-status-separator ""
setw -g window-status-style "bg=#{@rose_pine_base},fg=#{@rose_pine_muted}"
setw -g window-status-format "#[bg=#{@rose_pine_base},fg=#{@rose_pine_muted}]  #I #W#{?window_flags, #F,}  "
setw -g window-status-current-style "bg=#{@rose_pine_overlay},fg=#{@rose_pine_text},bold"
setw -g window-status-current-format "#[bg=#{@rose_pine_overlay},fg=#{@rose_pine_rose},bold]  #I #[fg=#{@rose_pine_text}]#W#{?window_flags, #[fg=#{@rose_pine_gold}]#F,}  "
setw -g window-status-activity-style "bg=#{@rose_pine_base},fg=#{@rose_pine_gold}"
setw -g window-status-bell-style "bg=#{@rose_pine_overlay},fg=#{@rose_pine_love},bold"
setw -g monitor-activity on
setw -g monitor-bell off
set -g visual-activity off

# Pane Borders
set -g pane-border-style "fg=#{@rose_pine_highlight_med}"
set -g pane-active-border-style "fg=#{@rose_pine_iris}"
set -gF display-panes-colour "#{@rose_pine_iris}"
set -gF display-panes-active-colour "#{@rose_pine_love}"

# Messages / modes
set -g message-style "bg=#{@rose_pine_overlay},fg=#{@rose_pine_text}"
set -g message-command-style "bg=#{@rose_pine_overlay},fg=#{@rose_pine_foam}"
set -g mode-style "bg=#{@rose_pine_highlight_low},fg=#{@rose_pine_foam}"
set -gF clock-mode-colour "#{@rose_pine_iris}"
